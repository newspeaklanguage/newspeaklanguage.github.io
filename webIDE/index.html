<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Newspeak Web IDE</title>

    <base href="/" />

    <!-- This meta viewport ensures the webpage's dimensions change according to the device it's on. This is called Responsive Web Design.-->
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <meta
      name="description"
      content="This is a PWA version of the Newspeak Web IDE"
    />
    <meta name="theme-color" content="blue" />

    <!-- These meta tags are Apple-specific, and set the web application to run in full-screen mode with a black status bar. Learn more at https://developer.apple.com/library/archive/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Newspeak Web IDE" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- Imports an icon to represent the document. -->
    <link rel="icon" href="/webIDE/public/assets/icons/icon-24.png" type="image/x-icon" />

    <!-- Imports the manifest to represent the web application. A web app must have a manifest to be a PWA. -->
    <link rel="manifest" href="/webIDE/manifest.json" />

    <!-- Imports of CodeMirror CSS. -->
    <link rel="stylesheet" href="/webIDE/public/assets/lib/codemirror.css" />
  </head>

  <body>
    <!-- Imports of JS scripts. -->
    <script>
      let scripts = [
        '/webIDE/public/assets/lib/primordialsoup-setup.js',
        '/webIDE/public/assets/lib/primordialsoup.js',
        '/webIDE/public/assets/lib/codemirror.js',
        '/webIDE/public/assets/lib/codemirror_autorefresh.js',
        '/webIDE/public/assets/lib/jszip.min.js',
        // Self-hosted third-party JS for MemoryHole + side-by-side diffs.
        // Loaded with async=false so they execute in listed order and are
        // in window.* before the Newspeak side first reads
        // `global at: 'git' / 'LightningFS' / 'GitHttp' / 'diff_match_patch'`.
        // Vendored bytes preserved at public/assets/lib/vendor/; bumping
        // the pinned filename here requires bumping the corresponding
        // urlsToCache entry in sw.js AND the pwaVersion.
        // buffer must come BEFORE isomorphic-git -- the bundle expects a
        // `Buffer` global at evaluation time. The setup script that runs
        // right after loads exposes window.Buffer from the bundle's
        // window.buffer.Buffer.
        '/webIDE/public/assets/lib/vendor/buffer-6.0.3.bundle.min.js',
        '/webIDE/public/assets/lib/vendor/isomorphic-git-1.38.4.umd.min.js',
        '/webIDE/public/assets/lib/vendor/lightning-fs-4.6.2.min.js',
        '/webIDE/public/assets/lib/vendor/isomorphic-git-1.38.4-http-web.umd.js',
        '/webIDE/public/assets/lib/vendor/diff_match_patch-2019-07.js',
      ];

      // Dynamic scripts with async=false all load, then execute in listed order
      // (like defer), just before DOMContentLoaded.
      scripts.forEach(function (url) {
        let script = document.createElement('script');
        script.src = url;
        script.async = false;
        // Pin window.Buffer right after buffer's bundle finishes loading,
        // so the next script in line (isomorphic-git) finds it as a
        // global. The bundle exposes the export as window.buffer.Buffer.
        if (url.indexOf('buffer-6.0.3.bundle.min.js') >= 0) {
          script.onload = function () {
            window.Buffer = window.buffer.Buffer;
          };
        }
        document.body.appendChild(script);
      });

      if ('serviceWorker' in navigator) {
        // Register service worker. Default scope starts at /webIDE/.
        navigator.serviceWorker.register('/webIDE/sw.js').then(
          (registration) => {
            console.log('Service worker registration success: ' + registration);
          },
          (error) => {
            console.error('Service worker registration failed: ' + error);
          }
        );
      } else {
        console.error('Browser does not support service workers!');
      }
    </script>
  </body>
</html>
